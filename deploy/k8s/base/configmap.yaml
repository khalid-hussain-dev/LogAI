apiVersion: v1
kind: ConfigMap
metadata:
  name: logai-config
data:
  ENVIRONMENT: "production"
  DEBUG: "false"
  APP_VERSION: "0.1.0"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "logai"
  POSTGRES_USER: "logai"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  ELASTICSEARCH_INDEX_LOGS: "logai-logs"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_STREAM_INGEST: "logai:stream:ingest"
  REDIS_STREAM_PROCESSED: "logai:stream:processed"
  REDIS_CONSUMER_GROUP: "logai-workers"
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "30"
  AUTH_SERVICE_PORT: "4001"
  FRONTEND_URL: "http://logai.local"
  ALLOWED_ORIGINS: "http://logai.local"
  RATE_LIMIT_PER_MINUTE: "120"
  INGEST_RATE_LIMIT_PER_MINUTE: "2000"
  ANOMALY_SCORE_THRESHOLD: "0.5"
  ANOMALY_WINDOW_SECONDS: "60"
  ANOMALY_USE_ISOLATION_FOREST: "true"
  ANOMALY_MIN_TRAIN_SAMPLES: "100"
  ANOMALY_RETRAIN_INTERVAL: "500"
  ANOMALY_MAX_TRAIN_BUFFER: "4000"
  ANOMALY_IFOREST_ESTIMATORS: "200"
  ANOMALY_IFOREST_CONTAMINATION: "0.05"
  ANOMALY_IFOREST_RANDOM_STATE: "42"
  NODE_ENV: "production"
