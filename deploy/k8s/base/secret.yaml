apiVersion: v1
kind: Secret
metadata:
  name: logai-secrets
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-postgres-password"
  DATABASE_URL: "postgresql+asyncpg://logai:change-me-postgres-password@postgres:5432/logai"
  REDIS_PASSWORD: "change-me-redis-password"
  REDIS_URL: "redis://:change-me-redis-password@redis:6379/0"
  JWT_SECRET_KEY: "change-me-jwt-secret"
  SESSION_SECRET: "change-me-session-secret"
  GOOGLE_CLIENT_ID: "replace-google-client-id"
  GOOGLE_CLIENT_SECRET: "replace-google-client-secret"
  GOOGLE_REDIRECT_URI: "http://logai.local/api/auth/google/callback"
  GITHUB_CLIENT_ID: "replace-github-client-id"
  GITHUB_CLIENT_SECRET: "replace-github-client-secret"
  GITHUB_REDIRECT_URI: "http://logai.local/api/auth/github/callback"

