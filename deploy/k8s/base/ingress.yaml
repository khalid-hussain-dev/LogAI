apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: logai-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: logai.local
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: logai-backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: logai-backend
                port:
                  number: 8000
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: logai-auth-service
                port:
                  number: 4001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: logai-frontend
                port:
                  number: 80
