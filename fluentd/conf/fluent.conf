# ============================================================
# LogAI — Fluentd Configuration
# ============================================================
# Receives logs from:
#   1. Docker logging driver (apps using logai-agent)
#   2. HTTP POST (port 9880)
#   3. Syslog UDP (port 5140)
# All enriched → Redis List → stream-worker
# ============================================================

# ── INPUT 1: Forward Protocol (port 24224) ───────────────────
# Receives logs from Docker Fluentd logging driver and other Fluentd agents
<source>
  @type forward
  port 24224
  bind 0.0.0.0
  tag logai.forward
</source>

# ── INPUT 2: HTTP (port 9880) ────────────────────────────────
# Apps POST logs via HTTP (e.g., curl, httpx, fetch)
<source>
  @type http
  port 9880
  bind 0.0.0.0
  body_size_limit 10m
  keepalive_timeout 10s
  tag logai.http
</source>

# ── INPUT 3: Syslog UDP (port 5140) ─────────────────────────
# Receive system logs via syslog UDP protocol
<source>
  @type syslog
  port 5140
  bind 0.0.0.0
  protocol_type udp
  tag logai.syslog
</source>

# ── FILTER: Enrich all records ───────────────────────────────
# Handles both Docker container logs (with labels) and direct logs.
# Docker container logs have: log, container_id, container_name, logai_server_id, logai_server_name
# Direct logs have: message, level, service, host, server_id, server_name
<filter logai.** **>
  @type record_transformer
  enable_ruby true
  <record>
    fluentd_host "#{Socket.gethostname}"
    ingest_time ${Time.at(time).utc.strftime('%Y-%m-%dT%H:%M:%S.%LZ')}
    message ${record["message"] || record["log"] || ""}
    service ${record["service"] || (record["container_name"] || "").sub(/^\//, "")}
    environment ${record["environment"] || ENV["ENVIRONMENT"] || "development"}
    server_id ${record["logai_server_id"] || record["server_id"] || ENV["FLUENTD_SERVER_ID"] || "fluentd-default"}
    server_name ${record["logai_server_name"] || record["server_name"] || ENV["FLUENTD_SERVER_NAME"] || "Fluentd Collector"}
  </record>
</filter>

# ── OUTPUT: Redis List ─────────────────────────────────────
# Push all logs to Redis List for processing by stream-worker
<match logai.** **>
  @type redis_store
  host "#{ENV['REDIS_HOST'] || 'redis'}"
  port "#{ENV['REDIS_PORT'] || '6379'}"
  password "#{ENV['REDIS_PASSWORD'] || 'logai_redis_2025'}"
  db 0
  store_type list
  key logai:list:fluentd
  order asc

  # File buffer with retry — ensures logs are never lost if Redis is down
  <buffer>
    @type file
    path /fluentd/buffer/redis
    flush_interval 1s
    flush_mode interval
    retry_max_interval 30s
    retry_forever true
    chunk_limit_size 5m
    total_limit_size 512m
    overflow_action block
  </buffer>
</match>
