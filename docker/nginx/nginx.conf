# ============================================================
# LogAI — NGINX Reverse Proxy Configuration
# Routes all traffic through a single entry point (port 80).
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstreams ────────────────────────────────────────────
    upstream fastapi_backend {
        server backend:8000;
    }

    upstream auth_service {
        server auth-service:4001;
    }

    upstream fluentd_http {
        server fluentd:9880;
    }

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Server ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Increase max body size for batch ingestion
        client_max_body_size 10m;

        # ── FastAPI endpoints (/api/v1/*) ────────────────────
        location /api/v1/ {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade headers (for /api/v1/ws if used via /api/v1/ path)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── WebSocket endpoint (/ws) ─────────────────────────
        location /ws {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Node.js OAuth auth-service (/api/auth/*) ────────
        location /api/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Fluentd HTTP log ingestion (/logs/ingest/) ──────
        location /logs/ingest/ {
            proxy_pass http://fluentd_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── FastAPI docs ─────────────────────────────────────
        location /docs {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
        }

        # ── Health check ─────────────────────────────────────
        location /health {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
        }
    }
}

