###############################################################################
# LogAI — docker-compose.yml
# Start everything: docker-compose up -d
###############################################################################

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - logai_network

  # ── Elasticsearch ──────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=logai-cluster
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - logai_network

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - logai_network

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logai_network

  # ── Stream Worker ──────────────────────────────────────────
  stream-worker:
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    env_file: .env
    command: python -m app.workers.stream_worker
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logai_network

  # ── Node.js Auth Service ───────────────────────────────────
  auth-service:
    build: ./auth-service
    restart: unless-stopped
    env_file: .env
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logai_network

  # ── Fluentd ────────────────────────────────────────────────
  fluentd:
    build: ./fluentd
    restart: unless-stopped
    env_file: .env
    ports:
      - "24224:24224"          # Forward protocol
      - "24224:24224/udp"
      - "9880:9880"            # HTTP input
      - "5140:5140/udp"        # Syslog input
    volumes:
      - fluentd_buffer:/fluentd/buffer
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - logai_network

  # ── NGINX ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - auth-service
      - fluentd
    networks:
      - logai_network

  # ── Kibana (optional, use: docker-compose --profile tools up kibana) ──
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    profiles: ["tools"]
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - logai_network

volumes:
  postgres_data:
  es_data:
  redis_data:
  fluentd_buffer:

networks:
  logai_network:
    driver: bridge

